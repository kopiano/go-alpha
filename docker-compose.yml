services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gin-backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      MYSQL_DB: go_alpha
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENWEATHER_KEY: ${OPENWEATHER_KEY}
      WEATHERAPI_KEY: ${WEATHERAPI_KEY}
    restart: always
    volumes:
      - ./assets/avatar:/app/assets/avatar
      - ./assets/image:/app/assets/image

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: go_alpha
    volumes:
      - mysql_data:/var/lib/mysql
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  mysql_data:
  redis_data:
